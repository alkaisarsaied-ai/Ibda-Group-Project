<!DOCTYPE html>
<html lang="en" dir="ltr" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibda'a Group | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        brand: { gold: '#D4AF37', dark: '#000000', primary: '#3b82f6' } 
                    } 
                } 
            }
        }
    </script>
</head>
<body class="bg-white dark:bg-black text-slate-900 dark:text-gray-100 transition-colors duration-300">
    <nav class="bg-slate-900 dark:bg-zinc-900 text-white p-5 sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="flex items-center group">
                <i class="fa-solid fa-layer-group text-brand-primary dark:text-brand-gold text-3xl mr-3"></i>
                <span class="text-2xl font-bold">Ibda'a<span class="text-brand-primary dark:text-brand-gold">Group</span></span>
            </a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-brand-primary dark:text-brand-gold font-bold">Home</a>
                <a href="services.html" class="hover:text-brand-primary dark:hover:text-brand-gold transition-colors">Services</a>
                <a href="about.html" class="hover:text-brand-primary dark:hover:text-brand-gold transition-colors">About Us</a>
                <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-slate-800 dark:bg-zinc-800 text-brand-gold">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
                <a href="contact.html" class="bg-brand-primary dark:bg-brand-gold dark:text-black px-6 py-2 rounded-full font-bold hover:opacity-90 transition-all">Contact</a>
            </div>
        </div>
    </nav>

    <header class="py-32 px-6 text-center bg-white dark:bg-black">
        <h1 class="text-6xl font-extrabold mb-6 dark:text-white">Smart Solutions <br><span class="text-brand-primary dark:text-brand-gold">For Your Future</span></h1>
        <p class="text-slate-500 dark:text-gray-400 text-xl max-w-2xl mx-auto mb-10">We help companies with digital transformation through innovative strategies and modern technologies.</p>
        <a href="services.html" class="bg-brand-primary dark:bg-brand-gold dark:text-black px-10 py-4 rounded-2xl font-bold text-lg shadow-lg hover:-translate-y-1 transition-all inline-block">Explore Services</a>
    </header>

    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }
        // Check local storage on load
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
        }
    </script>
</body>
</html>
